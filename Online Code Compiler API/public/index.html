<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Code Compiler</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e1e; color: #fff; padding: 20px; }
        textarea { width: 100%; height: 200px; background: #2d2d2d; color: #00ff00; font-family: monospace; padding: 10px; font-size: 16px; border: none; }
        button { background: #007acc; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px; font-size: 16px; }
        #terminal { background: #000; padding: 15px; margin-top: 20px; min-height: 150px; font-family: monospace; white-space: pre-wrap; }
        .error { color: #ff4d4d; }
        .info { color: #888; }
    </style>
</head>
<body>

    <h2>JavaScript Remote Compiler</h2>
    
    <textarea id="codeEditor">
console.log("Hello from the browser!");
for(let i = 0; i < 5; i++) {
    console.log("Counting: " + i);
}
    </textarea>
    
    <button onclick="runCode()">Run Code</button>

    <div id="terminal"></div>

    <script>
        const terminal = document.getElementById('terminal');
        
        // Connect to the WebSocket automatically when the page loads
        const ws = new WebSocket(`ws://${window.location.host}`);

        // The Client's Ear
        ws.onmessage = (event) => {
            const response = JSON.parse(event.data);
            
            if (response.status === 'output') {
                terminal.innerHTML += response.data;
            } else if (response.status === 'error') {
                terminal.innerHTML += `<span class="error">${response.data}</span>`;
            } else if (response.status === 'finished') {
                terminal.innerHTML += `<br><span class="info">[Process exited in ${response.time}ms]</span><br>`;
            } else if (response.status === 'info') {
                terminal.innerHTML += `<span class="info">${response.data}</span><br>`;
            }
        };

        // The Client's Mouth
        function runCode() {
            const code = document.getElementById('codeEditor').value;
            terminal.innerHTML = ''; // Clear old output
            ws.send(code); // Fire it to the server!
        }
    </script>
</body>
</html>
